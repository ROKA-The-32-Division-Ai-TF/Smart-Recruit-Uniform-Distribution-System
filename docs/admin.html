<!doctype html>
<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d3f8f" />
    <title>관리자 현황 확인</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=20260518-item-images-1" />

  <body class="admin-body">
    <main id="adminApp" class="admin-shell">
      <section class="admin-login">

        <label>
          관리자 PIN

        <button id="adminLogin" class="primary-button" type="button">현황 확인</button>
        <p id="adminMessage" class="admin-message"></p>
      </section>
    </main>
    <script type="module" src="src/admin.js?v=20260518-item-images-1"></script>
  </body>
</html>
